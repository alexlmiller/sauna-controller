# Wired wall panel firmware for the current Rev B control board.

substitutions:
  device_name: sauna-panel-wired
  friendly_name: Sauna Panel
  link_timeout_ms: "5000"
  feedback_sensor_id: relay_fb_closed
  feedback_placeholder_text: "Relay    --"
  feedback_on_text: "Relay    ON"
  feedback_off_text: "Relay    OFF"
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  ota_password: !secret ota_password

packages:
  wall_panel: !include packages/wired.yaml
