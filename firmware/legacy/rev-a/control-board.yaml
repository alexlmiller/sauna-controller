# Control board firmware for Rev A/perfboard-style wiring.

substitutions:
  device_name: sauna-controller
  friendly_name: Sauna Controller
  controller_project_version: "1.0-rev-a"
  feedback_sensor_id: contactor_aux_closed
  feedback_sensor_name: Contactor Aux Closed
  door_pin: GPIO22
  feedback_pin: GPIO32
  feedback_pullup: "true"
  high_limit_pin: GPIO33
  high_limit_pullup: "true"
  coil_pin: GPIO13
  panel_tx_pin: GPIO14
  panel_rx_pin: GPIO4
  pwm_r_pin: GPIO16
  pwm_g_pin: GPIO17
  pwm_b_pin: GPIO18
  pwm_w_pin: GPIO19
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  wifi_fallback_pw: !secret wifi_fallback_pw
  ota_password: !secret ota_password
  api_key: !secret api_key
  syslog_host: !secret syslog_host

packages:
  control_board: !include ../../control-board/packages/common.yaml
