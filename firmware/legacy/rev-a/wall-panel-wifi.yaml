# WiFi/HA wall panel firmware for Rev A control board firmware.

substitutions:
  device_name: sauna-panel
  friendly_name: Sauna Panel
  link_timeout_ms: "30000"
  feedback_sensor_id: contactor_aux_closed
  feedback_ha_entity: binary_sensor.sauna_controller_contactor_aux_closed
  feedback_placeholder_text: "Aux      --"
  feedback_on_text: "Aux      ON"
  feedback_off_text: "Aux      OFF"
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  ota_password: !secret ota_password
  api_key: !secret api_key

packages:
  wall_panel: !include ../../wall-panel/packages/wifi.yaml
