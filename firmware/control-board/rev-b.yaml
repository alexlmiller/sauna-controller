# Control board firmware for Rev B carrier PCB.

substitutions:
  device_name: sauna-controller
  friendly_name: Sauna Controller
  controller_project_version: "1.0-rev-b"
  feedback_sensor_id: relay_fb_closed
  feedback_sensor_name: Relay Feedback Closed
  door_pin: GPIO25
  feedback_pin: GPIO34
  feedback_pullup: "false"
  high_limit_pin: GPIO35
  high_limit_pullup: "false"
  coil_pin: GPIO23
  panel_tx_pin: GPIO32
  panel_rx_pin: GPIO33
  pwm_r_pin: GPIO19
  pwm_g_pin: GPIO18
  pwm_b_pin: GPIO17
  pwm_w_pin: GPIO16
  fault_led_pin: GPIO22
  aux_output_pin: GPIO4
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  wifi_fallback_pw: !secret wifi_fallback_pw
  ota_password: !secret ota_password
  api_key: !secret api_key
  syslog_host: !secret syslog_host

packages:
  control_board: !include packages/common.yaml
  rev_b_hardware: !include packages/rev-b-hardware.yaml
