###############################################################################
# Sauna Panel — WiFi Transport (via Home Assistant)
# For desk testing. Panel subscribes to controller entities via HA native API.
###############################################################################

substitutions:
  device_name: sauna-panel
  friendly_name: Sauna Panel
  link_timeout_ms: "30000"

packages:
  common: !include sauna-panel-common.yaml

api:
  encryption:
    key: !secret api_key

############### CONSUMED SENSOR DATA ###############

sensor:
  - platform: homeassistant
    id: ceiling_temp_c
    entity_id: sensor.sauna_controller_ceiling_temp
    on_value:
      then:
        - lambda: |-
            id(last_rx_ms) = millis();
            id(current_temp) = x;
        - lvgl.label.update:
            id: lbl_current_temp
            text: !lambda 'return str_sprintf("%.0f°", x);'
        - lvgl.label.update:
            id: lbl_info_ceiling
            text: !lambda 'return str_sprintf("Ceiling  %.0f°F", x);'
        - script.execute: update_status_ring

  - platform: homeassistant
    id: bench_temp_c
    entity_id: sensor.sauna_controller_bench_temp
    on_value:
      then:
        - lambda: 'id(last_rx_ms) = millis();'
        - lvgl.label.update:
            id: lbl_info_bench
            text: !lambda 'return str_sprintf("Bench    %.0f°F", x);'

  - platform: homeassistant
    id: target_temp_current
    entity_id: climate.sauna_heater
    attribute: temperature
    on_value:
      then:
        - lambda: |-
            id(last_rx_ms) = millis();
            if (!id(synced)) id(synced) = true;
            if (id(target_temp_dirty) && abs(x - id(local_target_temp)) < 1.5f) {
              id(target_temp_dirty) = false;
            }
            if (!id(target_temp_dirty)) {
              id(local_target_temp) = x;
            }
        - lvgl.label.update:
            id: lbl_target_temp
            text: !lambda 'return str_sprintf("%.0f°F", x);'

  - platform: homeassistant
    id: light_brightness_ha
    entity_id: light.sauna_interior_leds
    attribute: brightness
    on_value:
      then:
        - lambda: |-
            id(last_rx_ms) = millis();
            float norm = x / 255.0f;
            if (id(brightness_dirty) && abs(norm - id(local_brightness)) < 0.03f) {
              id(brightness_dirty) = false;
            }
            if (!id(brightness_dirty)) {
              id(local_brightness) = norm;
              lv_arc_set_value(id(arc_brightness), (int)(norm * 100.0f));
            }


############### CONSUMED STATUS DATA ###############

binary_sensor:
  - platform: homeassistant
    id: door_sensor
    entity_id: binary_sensor.sauna_controller_sauna_door
    on_state:
      then:
        - lambda: 'id(last_rx_ms) = millis();'
        - lvgl.label.update:
            id: lbl_info_door
            text: !lambda 'return x ? std::string("Door     OPEN") : std::string("Door     CLOSED");'
            text_color: !lambda 'return x ? lv_color_hex(0xFF6B00) : lv_color_hex(0x00CC66);'

  - platform: homeassistant
    id: contactor_aux_closed
    entity_id: binary_sensor.sauna_controller_contactor_aux_closed
    on_state:
      then:
        - lambda: |-
            id(last_rx_ms) = millis();
            id(heater_running) = x;
        - script.execute: update_status_ring
        - lvgl.label.update:
            id: lbl_info_aux
            text: !lambda 'return x ? std::string("Aux      ON") : std::string("Aux      OFF");'
            text_color: !lambda 'return x ? lv_color_hex(0x00CC66) : lv_color_hex(0x888888);'

  - platform: homeassistant
    id: high_limit_trip
    entity_id: binary_sensor.sauna_controller_high_limit_trip
    on_state:
      then:
        - lambda: 'id(last_rx_ms) = millis();'
        - lvgl.label.update:
            id: lbl_info_hilimit
            text: !lambda 'return x ? std::string("Hi-Limit TRIP") : std::string("Hi-Limit OK");'
            text_color: !lambda 'return x ? lv_color_hex(0xFF0000) : lv_color_hex(0x00CC66);'


text_sensor:
  # Light color — parse hue from hs_color string "(hue, sat)"
  - platform: homeassistant
    id: light_hs_str
    entity_id: light.sauna_interior_leds
    attribute: hs_color
    on_value:
      then:
        - lambda: |-
            // Skip if a preset was just selected from the panel (3s cooldown)
            if (id(preset_set_ms) > 0 && (millis() - id(preset_set_ms)) < 3000) return;
            float hue = 0;
            sscanf(x.c_str(), "(%f", &hue);
            if (hue == 0 && x.length() > 0) {
              sscanf(x.c_str(), "%f", &hue);
            }
            uint32_t color;
            if (hue < 15 || hue > 345) {
              color = 0x8B0000;   // RED (hue ~0)
            } else if (hue < 50) {
              color = 0xFFB366;   // WARM (hue ~29)
            } else if (hue < 80) {
              color = 0xFFFFFF;   // WHITE-ish
            } else if (hue < 160) {
              color = 0x006400;   // GREEN (hue ~120)
            } else if (hue < 260) {
              color = 0x3388FF;   // BLUE (hue ~220)
            } else {
              color = 0x9932CC;   // PURPLE (hue ~275)
            }
            id(light_ring_color) = color;
        - lvgl.arc.update:
            id: arc_brightness
            indicator:
              arc_color: !lambda 'return lv_color_hex(id(light_ring_color));'

  - platform: homeassistant
    id: sauna_climate_mode
    entity_id: climate.sauna_heater
    on_value:
      then:
        - lambda: |-
            id(last_rx_ms) = millis();
            if (!id(synced)) id(synced) = true;
            bool is_heat = (x == "heat");
            float controller_val = is_heat ? 1.0f : 0.0f;
            if (id(heat_mode_dirty) && abs(controller_val - id(local_heat_mode)) < 0.1f) {
              id(heat_mode_dirty) = false;
            }
            if (!id(heat_mode_dirty)) {
              id(local_heat_mode) = controller_val;
            }
        - script.execute: update_status_ring
        - lvgl.label.update:
            id: lbl_info_heater
            text: !lambda |-
              return id(sauna_climate_mode).state == "heat" ?
                std::string("Heater   HEAT") : std::string("Heater   OFF");
            text_color: !lambda |-
              return id(sauna_climate_mode).state == "heat" ?
                lv_color_hex(0xFF6B00) : lv_color_hex(0x888888);

  # HVAC action — "heating", "idle", "off"
  - platform: homeassistant
    id: sauna_hvac_action
    entity_id: climate.sauna_heater
    attribute: hvac_action
    on_value:
      then:
        - lambda: |-
            id(last_rx_ms) = millis();
            id(heater_running) = (x == "heating");
        - script.execute: update_status_ring

  - platform: homeassistant
    id: last_trip_reason
    entity_id: sensor.sauna_controller_last_trip_reason
    on_value:
      then:
        - lambda: |-
            id(last_rx_ms) = millis();
            id(fault_active) = x.length() > 0;
        - if:
            condition:
              lambda: 'return x.length() > 0;'
            then:
              - lvgl.widget.show: fault_banner
              - lvgl.widget.show: btn_clear_fault
              - lvgl.label.update:
                  id: lbl_fault_text
                  text: !lambda 'return x;'
            else:
              - lvgl.widget.hide: fault_banner
              - lvgl.widget.hide: btn_clear_fault
        - script.execute: update_status_ring

############### COMMAND SENDING ###############

interval:
  - interval: 500ms
    then:
      - if:
          condition:
            lambda: 'return id(target_temp_dirty);'
          then:
            - homeassistant.service:
                service: climate.set_temperature
                data:
                  entity_id: climate.sauna_heater
                data_template:
                  temperature: "{{ target_val }}"
                variables:
                  target_val: |-
                    return id(local_target_temp);
      - if:
          condition:
            lambda: 'return id(heat_mode_dirty);'
          then:
            - homeassistant.service:
                service: climate.set_hvac_mode
                data:
                  entity_id: climate.sauna_heater
                data_template:
                  hvac_mode: "{{ mode_val }}"
                variables:
                  mode_val: |-
                    if (id(local_heat_mode) >= 0.5f) return std::string("heat");
                    return std::string("off");
      - if:
          condition:
            lambda: 'return id(brightness_dirty);'
          then:
            - homeassistant.service:
                service: light.turn_on
                data:
                  entity_id: light.sauna_interior_leds
                data_template:
                  brightness: "{{ bri_val }}"
                variables:
                  bri_val: |-
                    return (int)(id(local_brightness) * 255.0f);
      - if:
          condition:
            lambda: 'return id(light_toggle_pending);'
          then:
            - lambda: 'id(light_toggle_pending) = false;'
            - homeassistant.service:
                service: light.toggle
                data:
                  entity_id: light.sauna_interior_leds
      - if:
          condition:
            lambda: 'return id(clear_fault_pending);'
          then:
            - lambda: 'id(clear_fault_pending) = false;'
            - homeassistant.service:
                service: button.press
                data:
                  entity_id: button.sauna_controller_clear_fault
      - if:
          condition:
            lambda: 'return id(preset_pending) >= 0;'
          then:
            - lambda: |-
                int p = id(preset_pending);
                id(preset_pending) = -1;
                // Preset-specific HA calls handled below
            - if:
                condition:
                  lambda: 'return id(active_preset) == 0;'
                then:
                  - homeassistant.service:
                      service: light.turn_on
                      data:
                        entity_id: light.sauna_interior_leds
                        color_temp_kelvin: "4500"
                        brightness: "200"
                        transition: "1"
            - if:
                condition:
                  lambda: 'return id(active_preset) == 1;'
                then:
                  - homeassistant.service:
                      service: light.turn_on
                      data:
                        entity_id: light.sauna_interior_leds
                        color_temp_kelvin: "2700"
                        brightness: "200"
                        transition: "1"
            - if:
                condition:
                  lambda: 'return id(active_preset) == 2;'
                then:
                  - homeassistant.service:
                      service: light.turn_on
                      data:
                        entity_id: light.sauna_interior_leds
                      data_template:
                        rgbw_color: "[255, 80, 40, 60]"
                        brightness: "255"
                        transition: "1"
            - if:
                condition:
                  lambda: 'return id(active_preset) == 3;'
                then:
                  - homeassistant.service:
                      service: light.turn_on
                      data:
                        entity_id: light.sauna_interior_leds
                      data_template:
                        rgb_color: "[0, 100, 0]"
                        brightness: "255"
                        transition: "1"
